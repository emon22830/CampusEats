# NOTE: campuseats-backend was created manually in the Render dashboard
# (not via "New > Blueprint"), so this file isn't actively driving the live
# deployment. It's kept as documentation of the intended config - env vars
# marked `sync: false` are set by hand in the dashboard and won't be
# overwritten if this blueprint is ever applied.
#
# Database: free-tier managed MySQL on Aiven (aiven.io), not Render - Render
# has no free managed MySQL and private services cost $7/mo minimum even on
# the cheapest plan. See backend/certs/ for the Aiven CA cert required for
# the SSL connection (see src/Database/Connection.php).
services:
  - name: campuseats-backend
    type: web
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_SSL_CA
        value: /var/www/html/certs/aiven-ca.pem
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: 86400
      - key: APP_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
